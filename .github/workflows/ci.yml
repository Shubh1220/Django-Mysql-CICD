name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps for mysqlclient
        run: sudo apt-get update && sudo apt-get install -y default-libmysqlclient-dev build-essential pkg-config

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_DATABASE: test_db
          MYSQL_USER: root
          MYSQL_PASSWORD: root
        run: python manage.py test notes --noinput

      - name: Build Docker image
        run: docker build -t django-mysql-sampleapp:${{ github.sha }} .
