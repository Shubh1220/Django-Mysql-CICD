<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sample Django + MySQL App</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 640px; margin: 40px auto; }
        .note { border: 1px solid #ddd; border-radius: 6px; padding: 10px 14px; margin-bottom: 10px; }
        .note h3 { margin: 0 0 4px 0; }
        form { margin-bottom: 24px; }
        input, textarea { display: block; width: 100%; margin-bottom: 8px; padding: 6px; box-sizing: border-box; }
        button { padding: 8px 14px; }
    </style>
</head>
<body>
    <h1>📝 Notes (Django + MySQL demo)</h1>

    <form method="post" action="{% url 'note_create' %}">
        {% csrf_token %}
        <input type="text" name="title" placeholder="Title" required>
        <textarea name="content" placeholder="Content"></textarea>
        <button type="submit">Add Note</button>
    </form>

    {% for note in notes %}
        <div class="note">
            <h3>{{ note.title }}</h3>
            <p>{{ note.content }}</p>
            <small>{{ note.created_at }}</small>
        </div>
    {% empty %}
        <p>No notes yet. Add one above!</p>
    {% endfor %}
</body>
</html>
